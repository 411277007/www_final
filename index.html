<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyGo 超級賣場 | 會員中心完整版</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary-color: #0f4c81; --accent-color: #ff9f43; }
        body { background-color: #f4f6f9; font-family: "Microsoft JhengHei", sans-serif; }
        .navbar { background-color: var(--primary-color); }
        .product-card { transition: 0.3s; cursor: pointer; border: none; border-radius: 10px; overflow: hidden; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.15); }
        .cart-fixed { position: fixed; bottom: 20px; right: 20px; z-index: 1000; }
        .hidden { display: none !important; }
        .section-container { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .detail-img { max-height: 400px; object-fit: cover; width: 100%; border-radius: 10px; }
        .list-group-item.active { background-color: var(--primary-color); border-color: var(--primary-color); }
        .card-input-box { background: #f8f9fa; border: 1px dashed #ced4da; border-radius: 8px; padding: 20px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#" onclick="showSection('home')">🛒 EasyGo 賣場</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto"><li class="nav-item"><a class="nav-link active" href="#" onclick="showSection('home')">首頁</a></li></ul>
                <div class="d-flex" id="authButtons">
                    <button class="btn btn-outline-light me-2" data-bs-toggle="modal" data-bs-target="#loginModal">登入</button>
                    <button class="btn btn-warning fw-bold" data-bs-toggle="modal" data-bs-target="#registerModal">註冊</button>
                </div>
                <div class="d-flex align-items-center hidden" id="userInfo">
                    <span id="userGreeting" class="text-white me-3 fw-bold"></span>
                    <button class="btn btn-info btn-sm me-2 fw-bold text-white" onclick="showSection('profile')">👤 個人資料</button>
                    <button class="btn btn-warning btn-sm me-2 fw-bold" onclick="showSection('orders')">🚚 運輸中商品</button>
                    <button class="btn btn-outline-danger btn-sm bg-white" onclick="logout()">登出</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mt-4 mb-5">
        
        <div id="homeSection" class="section-container">
            <div class="row">
                <div class="col-lg-3 col-md-4 mb-4">
                    <div class="list-group shadow-sm sticky-top" style="top: 80px;">
                        <button class="list-group-item list-group-item-action active fw-bold sidebar-btn" onclick="filterSidebar('全部', this)">📦 所有商品</button>
                        <button class="list-group-item list-group-item-action sidebar-btn" onclick="filterSidebar('生鮮', this)">🥩 生鮮食品</button>
                        <button class="list-group-item list-group-item-action sidebar-btn" onclick="filterSidebar('餅乾', this)">🍪 餅乾零食</button>
                        <button class="list-group-item list-group-item-action sidebar-btn" onclick="filterSidebar('麵包', this)">🍞 新鮮麵包</button>
                        <button class="list-group-item list-group-item-action sidebar-btn" onclick="filterSidebar('化妝品', this)">💄 美妝保養</button>
                        <button class="list-group-item list-group-item-action sidebar-btn" onclick="filterSidebar('衣服', this)">👕 流行服飾</button>
                    </div>
                </div>
                <div class="col-lg-9 col-md-8">
                    <div class="row mb-4"><div class="col-12"><input type="text" id="searchInput" class="form-control form-control-lg shadow-sm" placeholder="🔍 在此分類中搜尋商品..." onkeyup="searchProducts()"></div></div>
                    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" id="productGrid"></div>
                </div>
            </div>
        </div>

        <div id="detailSection" class="section-container hidden">
            <button class="btn btn-outline-secondary mb-3" onclick="showSection('home')">⬅ 返回列表</button>
            <div class="row bg-white p-4 rounded shadow-sm" id="detailContent"></div>
        </div>

        <div id="cartSection" class="section-container hidden">
            <h2 class="mb-4 fw-bold">您的購物車</h2>
            <div class="row">
                <div class="col-lg-8"><div id="cartItemsList" class="bg-white p-4 rounded shadow-sm mb-3"></div></div>
                <div class="col-lg-4">
                    <div class="bg-white p-4 rounded shadow-sm">
                        <h4 class="fw-bold">訂單摘要</h4><hr>
                        <div class="d-flex justify-content-between mb-2"><span>商品小計</span><span id="subtotal">$0</span></div>
                        <div class="d-flex justify-content-between mb-2"><span>運費</span><span>$60</span></div>
                        <h4 class="d-flex justify-content-between mt-3 text-danger fw-bold"><span>總計</span><span id="totalPrice">$0</span></h4>
                        <button class="btn btn-success btn-lg w-100 mt-4" onclick="goToCheckout()">填寫收件資訊</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="checkoutFormSection" class="section-container hidden">
            <div class="row justify-content-center">
                <div class="col-md-8 bg-white p-5 rounded shadow-sm">
                    <h3 class="fw-bold mb-4">填寫收件人資訊</h3>
                    <form id="checkoutForm" onsubmit="reviewOrder(event)">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">收件人姓名</label>
                                <input type="text" id="recvName" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">聯絡電話</label>
                                <input type="tel" id="recvPhone" class="form-control" pattern="09[0-9]{8}" placeholder="09xxxxxxxx" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">送達地址</label>
                            <input type="text" id="recvAddress" class="form-control" placeholder="請輸入完整地址" required>
                        </div>
                        
                        <div class="mb-4 form-check">
                            <input type="checkbox" class="form-check-input" id="rememberInfo">
                            <label class="form-check-label text-muted small" for="rememberInfo">
                                ☑ 記住我的收件資訊（姓名、電話、地址），以便下次結帳時自動填入
                            </label>
                        </div>

                        <div class="d-flex justify-content-between">
                            <button type="button" class="btn btn-outline-secondary" onclick="showSection('cart')">上一步</button>
                            <button type="submit" class="btn btn-primary">下一步：付款確認</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div id="checkoutConfirmSection" class="section-container hidden">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="bg-white p-5 rounded shadow-sm border border-warning">
                        <h3 class="fw-bold text-center mb-4 text-warning">請確認您的訂單並輸入卡號</h3>
                        <div class="card mb-4 bg-light"><div class="card-body">
                            <h5 class="card-title fw-bold">📍 收件資訊</h5>
                            <p class="mb-1"><strong>姓名：</strong><span id="confName"></span> | <strong>電話：</strong><span id="confPhone"></span></p>
                            <p class="mb-0"><strong>地址：</strong><span id="confAddress"></span></p>
                        </div></div>
                        <h5 class="fw-bold">🛒 購買清單</h5>
                        <ul class="list-group mb-4" id="confCartItems"></ul>

                        <div class="card-input-box mb-4">
                            <h5 class="fw-bold mb-3">💳 信用卡付款資訊</h5>
                            <div class="mb-3">
                                <label class="form-label small fw-bold">信用卡號</label>
                                <input type="text" id="cardNum" class="form-control" placeholder="1234 5678 1234 5678" maxlength="19">
                            </div>
                            <div class="row">
                                <div class="col-6">
                                    <label class="form-label small fw-bold">有效期限</label>
                                    <input type="text" id="cardExpiry" class="form-control" placeholder="MM/YY" maxlength="5">
                                </div>
                                <div class="col-6">
                                    <label class="form-label small fw-bold">安全碼 (CVC)</label>
                                    <input type="text" id="cardCvc" class="form-control" placeholder="123" maxlength="3">
                                </div>
                            </div>
                        </div>

                        <h3 class="text-end text-danger fw-bold mb-4">應付總額：<span id="confTotal"></span></h3>
                        <div class="d-flex justify-content-between">
                            <button class="btn btn-outline-secondary" onclick="showSection('checkoutForm')">修改地址</button>
                            <button class="btn btn-danger btn-lg px-5 shadow" onclick="processPayment()">💳 確認刷卡付款</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="ordersSection" class="section-container hidden">
            <button class="btn btn-outline-secondary mb-3" onclick="showSection('home')">⬅ 返回首頁</button>
            <h2 class="mb-4 fw-bold">🚚 您目前運輸中的商品</h2>
            <div id="ordersList"></div>
        </div>

        <div id="profileSection" class="section-container hidden">
            <button class="btn btn-outline-secondary mb-3" onclick="showSection('home')">⬅ 返回首頁</button>
            <div class="row">
                <div class="col-lg-5 mb-4">
                    <div class="bg-white p-4 rounded shadow-sm">
                        <h3 class="fw-bold mb-4 border-bottom pb-2 text-primary">👤 個人資料設定</h3>
                        <form id="profileForm" onsubmit="saveUserProfile(event)">
                            <div class="mb-3">
                                <label class="form-label fw-bold">電子郵件 (帳號)</label>
                                <input type="email" id="profEmail" class="form-control bg-light" readonly>
                                <small class="text-muted">註冊帳號不可變更</small>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">真實姓名</label>
                                <input type="text" id="profName" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">性別</label>
                                <select id="profGender" class="form-select" required>
                                    <option value="" disabled selected>請選擇性別</option>
                                    <option value="男">👨 男</option>
                                    <option value="女">👩 女</option>
                                    <option value="其他">🌈 其他 / 不便透露</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">聯絡電話</label>
                                <input type="tel" id="profPhone" class="form-control" pattern="09[0-9]{8}" placeholder="請輸入 09 開頭的手機號碼" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">生日</label>
                                <input type="date" id="profBirthday" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 fw-bold mt-4 shadow-sm">💾 儲存修改資料</button>
                        </form>
                    </div>
                </div>
                <div class="col-lg-7">
                    <div class="bg-white p-4 rounded shadow-sm">
                        <h3 class="fw-bold mb-4 border-bottom pb-2 text-secondary">📜 歷史訂購紀錄</h3>
                        <div id="historyOrdersList"></div>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <button class="btn btn-warning btn-lg rounded-circle cart-fixed shadow" onclick="showSection('cart')">🛒 <span id="badgeCount" class="badge bg-danger">0</span></button>

    <div class="modal fade" id="loginModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-light">
                    <h5 class="modal-title fw-bold">會員登入</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form onsubmit="handleLogin(event)">
                        <input type="email" id="loginUser" class="form-control mb-3" placeholder="請輸入 Email" required>
                        <input type="password" id="loginPw" class="form-control mb-3" placeholder="請輸入密碼" required>
                        <button type="submit" class="btn btn-primary w-100">立即登入</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
    <div class="modal fade" id="registerModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-warning">
                    <h5 class="modal-title fw-bold text-dark">註冊新會員</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form onsubmit="handleRegister(event)">
                        <input type="text" id="regName" class="form-control mb-3" placeholder="真實姓名" required>
                        <input type="email" id="regUser" class="form-control mb-3" placeholder="電子信箱" required>
                        <input type="password" id="regPw" class="form-control mb-3" placeholder="設定密碼" required>
                        <input type="password" id="regPwConfirm" class="form-control mb-3" placeholder="確認密碼" required>
                        <button type="submit" class="btn btn-dark w-100">建立帳號</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // --- 全局變數宣告 ---
        let products = []; 
        let cart = []; 
        let currentCategory = '全部';

        window.onload = async () => { 
            await fetchProductsFromAPI(); 
            checkUserStatus();            
            loadUserCart();               
            updateCartUI();               
        };

        function loadUserCart() {
            const user = localStorage.getItem('user');
            if (user) {
                cart = JSON.parse(localStorage.getItem('cart_' + user)) || [];
            } else {
                cart = []; 
            }
        }

        function saveCart() {
            const user = localStorage.getItem('user');
            if (user) {
                localStorage.setItem('cart_' + user, JSON.stringify(cart));
            }
            updateCartUI();
        }

        async function fetchProductsFromAPI() {
            try {
                const response = await fetch('./get_products.php');
                const result = await response.json();
                if (result.status === 'success') {
                    products = result.data;
                    renderProducts(products);
                } else {
                    console.error("獲取商品失敗:", result.message);
                }
            } catch (error) {
                console.error("API 連線錯誤:", error);
            }
        }

        function renderProducts(data) {
            const grid = document.getElementById('productGrid');
            if(data.length === 0) {
                grid.innerHTML = "<h4 class='text-center w-100 my-5 text-muted'>目前沒有商品資料</h4>";
                return;
            }
            grid.innerHTML = data.map(p => `
                <div class="col"><div class="card h-100 product-card shadow-sm" onclick="showProductDetail(${p.id})">
                    <img src="${p.img}" class="card-img-top" style="height: 180px; object-fit: cover;">
                    <div class="card-body text-center">
                        <span class="badge bg-secondary mb-2">${p.category}</span>
                        <h5 class="card-title fw-bold fs-6">${p.name}</h5>
                        <h5 class="text-danger fw-bold">$${p.price}</h5>
                    </div>
                </div></div>`).join('');
        }

        function addToCart(id) {
            if (!localStorage.getItem('user')) {
                alert("⚠️ 請先登入才能使用購物車功能！");
                return; 
            }
            const item = products.find(p => p.id === id);
            const found = cart.find(c => c.id === id);
            if (found) found.qty++; else cart.push({...item, qty: 1});
            saveCart(); 
            alert("✅ 已加入專屬購物車！");
        }

        // --- 切換頁面安全防護 ---
        function showSection(id) {
            if ((id === 'cart' || id === 'checkoutForm' || id === 'checkoutConfirm' || id === 'orders' || id === 'profile') && !localStorage.getItem('user')) {
                alert("⚠️ 請先登入才能進行此操作！");
                return; 
            }

            ['home', 'detail', 'cart', 'checkoutForm', 'checkoutConfirm', 'orders', 'profile'].forEach(s => {
                const el = document.getElementById(`${s}Section`);
                if (el) el.classList.add('hidden');
            }); 
            const targetEl = document.getElementById(`${id}Section`);
            if (targetEl) targetEl.classList.remove('hidden');
            window.scrollTo(0, 0);

            if (id === 'orders') {
                renderOrders();
            }
            if (id === 'profile') {
                loadUserProfilePage();
            }
        }

        function updateCartUI() {
            const badge = document.getElementById('badgeCount');
            if(badge) badge.innerText = cart.reduce((a,b) => a + b.qty, 0);

            const list = document.getElementById('cartItemsList');
            if(!list) return;
            
            if (cart.length === 0) { 
                list.innerHTML = "<p class='text-center my-5'>購物車是空的</p>"; 
                return; 
            }
            
            list.innerHTML = cart.map(c => `<div class="d-flex align-items-center mb-3 pb-3 border-bottom">
                <img src="${c.img}" style="width:60px; height:60px; object-fit:cover; border-radius:5px;">
                <div class="ms-3 flex-grow-1"><h6 class="mb-0">${c.name}</h6><small class="text-danger">$${c.price}</small></div>
                <div class="d-flex align-items-center">
                    <button class="btn btn-sm btn-outline-secondary" onclick="changeQty(${c.id}, -1)">-</button><span class="mx-2">${c.qty}</span><button class="btn btn-sm btn-outline-secondary" onclick="changeQty(${c.id}, 1)">+</button>
                    <button class="btn btn-link text-danger btn-sm ms-2" onclick="removeItem(${c.id})">刪除</button>
                </div></div>`).join('');
                
            const sub = cart.reduce((a,b) => a + (b.price * b.qty), 0);
            document.getElementById('subtotal').innerText = `$${sub}`;
            document.getElementById('totalPrice').innerText = `$${sub + 60}`;
        }

        function changeQty(id, delta) { const item = cart.find(c => c.id === id); item.qty += delta; if (item.qty < 1) removeItem(id); else saveCart(); }
        function removeItem(id) { cart = cart.filter(c => c.id !== id); saveCart(); }

        function filterSidebar(cat, btn) {
            currentCategory = cat;
            document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active', 'fw-bold'));
            btn.classList.add('active', 'fw-bold');
            renderProducts(cat === '全部' ? products : products.filter(p => p.category === cat));
        }

        function searchProducts() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const baseData = currentCategory === '全部' ? products : products.filter(p => p.category === currentCategory);
            renderProducts(baseData.filter(p => p.name.toLowerCase().includes(val)));
        }

        function showProductDetail(id) {
            const p = products.find(x => x.id === id);
            document.getElementById('detailContent').innerHTML = `
                <div class="col-md-6"><img src="${p.img}" class="detail-img" style="max-height:400px; object-fit:cover; width:100%;"></div>
                <div class="col-md-6 d-flex flex-column justify-content-center">
                    <span class="badge bg-secondary w-25 mb-2">${p.category}</span><h2 class="fw-bold">${p.name}</h2>
                    <h3 class="text-danger fw-bold my-3">$${p.price}</h3><p class="text-muted fs-5">${p.desc}</p>
                    <button class="btn btn-primary btn-lg mt-auto shadow" onclick="addToCart(${p.id})">🛒 加入購物車</button>
                </div>`;
            showSection('detail');
        }

        // --- 🔄 修改：填寫收件資訊前，先自動載入記住的資訊 ---
        function goToCheckout() {
            if (cart.length === 0) return alert("購物車是空的！");
            
            const user = localStorage.getItem('user');
            showSection('checkoutForm');

            // 自動檢查是否有儲存過收件資訊 (以目前登入的 user 帳號為隔離基礎)
            const savedInfo = JSON.parse(localStorage.getItem('saved_shipping_' + user));
            
            if (savedInfo) {
                document.getElementById('recvName').value = savedInfo.name || '';
                document.getElementById('recvPhone').value = savedInfo.phone || '';
                document.getElementById('recvAddress').value = savedInfo.address || '';
                document.getElementById('rememberInfo').checked = true; // 幫用戶維持勾選狀態
            } else {
                // 如果沒有存過，就保持空白，交給顧客自己填寫
                document.getElementById('recvName').value = '';
                document.getElementById('recvPhone').value = '';
                document.getElementById('recvAddress').value = '';
                document.getElementById('rememberInfo').checked = false;
            }
        }

        // --- 🔄 修改：預覽訂單時，同步處理「是否記住資訊」的儲存邏輯 ---
        function reviewOrder(e) {
            e.preventDefault();
            
            const user = localStorage.getItem('user');
            const name = document.getElementById('recvName').value.trim();
            const phone = document.getElementById('recvPhone').value.trim();
            const address = document.getElementById('recvAddress').value.trim();
            const isRemember = document.getElementById('rememberInfo').checked;

            // 核心邏輯：根據勾選狀態儲存或清除資料
            if (isRemember) {
                const shippingInfo = { name, phone, address };
                localStorage.setItem('saved_shipping_' + user, JSON.stringify(shippingInfo));
            } else {
                // 如果這次取消勾選，代表顧客不想記住，就從本機快取中移除
                localStorage.removeItem('saved_shipping_' + user);
            }

            // 將資料帶入確認刷卡頁面
            document.getElementById('confName').innerText = name;
            document.getElementById('confPhone').innerText = phone;
            document.getElementById('confAddress').innerText = address;
            document.getElementById('confCartItems').innerHTML = cart.map(c => `<li class="list-group-item d-flex justify-content-between">${c.name} x${c.qty} <span>$${c.price * c.qty}</span></li>`).join('');
            document.getElementById('confTotal').innerText = `$${cart.reduce((a,b) => a + (b.price * b.qty), 0) + 60}`;
            
            showSection('checkoutConfirm');
        }

        // --- 🔄 修改：付款成功後的表單重設 (手動重設，避免清除剛保存的 localStorage 資料) ---
        async function processPayment() {
            const cNum = document.getElementById('cardNum').value;
            const cExp = document.getElementById('cardExpiry').value;
            const cCvc = document.getElementById('cardCvc').value;

            if (cNum.length < 12 || cExp === "" || cCvc.length < 3) {
                alert("❌ 請輸入完整的信用卡資訊以完成支付。");
                return;
            }

            const orderData = {
                name: document.getElementById('confName').innerText,
                phone: document.getElementById('confPhone').innerText,
                address: document.getElementById('confAddress').innerText,
                total: document.getElementById('confTotal').innerText.replace('$', '')
            };

            try {
                const response = await fetch('./save_order.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                });
                const result = await response.json();
                
                if (result.status === 'success') {
                    alert(`💳 授權成功！(訂單編號: #${result.order_id || '10001'})\n付款成功。我們會盡快將商品送達。`);
                    
                    const user = localStorage.getItem('user');
                    const newOrder = {
                        order_id: result.order_id || Math.floor(Math.random() * 90000) + 10000,
                        date: new Date().toLocaleString(),
                        items: [...cart], 
                        total: orderData.total,
                        status: '運輸中'
                    };
                    
                    let userOrders = JSON.parse(localStorage.getItem('orders_' + user)) || [];
                    userOrders.unshift(newOrder);
                    localStorage.setItem('orders_' + user, JSON.stringify(userOrders));
                    
                    cart = []; 
                    localStorage.removeItem('cart_' + user); 
                    updateCartUI();

                    // 清空付款卡號表單
                    document.getElementById('cardNum').value = '';
                    document.getElementById('cardExpiry').value = '';
                    document.getElementById('cardCvc').value = '';
                    
                    showSection('home');
                } else {
                    alert("❌ 結帳失敗：" + result.message);
                }
            } catch (error) {
                console.error("結帳連線發生錯誤:", error);
                alert("結帳系統連線失敗！");
            }
        }

        function renderOrders() {
            const user = localStorage.getItem('user');
            const ordersList = document.getElementById('ordersList');
            if (!ordersList) return;

            const userOrders = JSON.parse(localStorage.getItem('orders_' + user)) || [];

            if (userOrders.length === 0) {
                ordersList.innerHTML = `<div class="bg-white p-5 rounded shadow-sm text-center"><p class="text-muted fs-5 mb-0">目前沒有運輸中的商品 📦</p></div>`;
                return;
            }

            ordersList.innerHTML = userOrders.map(order => `
                <div class="card mb-4 shadow-sm border-start border-4 border-warning">
                    <div class="card-header bg-light d-flex justify-content-between align-items-center py-3">
                        <div><span class="fw-bold text-dark fs-6">訂單編號：#${order.order_id}</span><small class="text-muted ms-3">${order.date}</small></div>
                        <span class="badge bg-warning text-dark px-3 py-2 fw-bold">🚚 ${order.status}</span>
                    </div>
                    <div class="card-body p-4">
                        <div class="row align-items-center">
                            <div class="col-md-8">
                                <ul class="list-group list-group-flush">
                                    ${order.items.map(item => `
                                        <li class="list-group-item d-flex justify-content-between align-items-center px-0 bg-transparent">
                                            <div class="d-flex align-items-center">
                                                <img src="${item.img}" style="width:55px; height:55px; object-fit:cover; border-radius:5px;" class="me-3 shadow-sm">
                                                <div><h6 class="mb-0 fw-bold text-dark">${item.name}</h6><small class="text-danger">$${item.price}</small></div>
                                            </div>
                                            <span class="badge bg-secondary rounded-pill">x ${item.qty}</span>
                                        </li>`).join('')}
                                </ul>
                            </div>
                            <div class="col-md-4 text-end border-start pt-3 pt-md-0">
                                <span class="text-muted small d-block mb-1">實付總額</span><h3 class="text-danger fw-bold mb-0">$${order.total}</h3>
                            </div>
                        </div>
                    </div>
                </div>`).join('');
        }

        // --- 從資料庫載入個人資料 ---
        async function loadUserProfilePage() {
            const user = localStorage.getItem('user');
            if (!user) return;

            document.getElementById('profEmail').value = user;

            try {
                const response = await fetch(`./profile_api.php?email=${encodeURIComponent(user)}`);
                const result = await response.json();

                if (result.status === 'success') {
                    const profile = result.data;
                    document.getElementById('profName').value = profile.name;
                    document.getElementById('profGender').value = profile.gender || '';
                    document.getElementById('profPhone').value = profile.phone || '';
                    document.getElementById('profBirthday').value = profile.birthday || '';
                    console.log(`目前會員資料庫 ID: ${profile.id}`);
                } else {
                    const defaultName = localStorage.getItem('regName_' + user) || user.split('@')[0];
                    document.getElementById('profName').value = defaultName;
                    document.getElementById('profGender').value = '';
                    document.getElementById('profPhone').value = '';
                    document.getElementById('profBirthday').value = '';
                }
            } catch (error) {
                console.error("無法從資料庫讀取資料:", error);
            }

            renderHistoryOrdersList();
        }

        // --- 將修改後的個人資料儲存至資料庫 ---
        async function saveUserProfile(e) {
            e.preventDefault();
            const user = localStorage.getItem('user');
            
            const updatedProfile = {
                email: user,
                name: document.getElementById('profName').value.trim(),
                gender: document.getElementById('profGender').value,
                phone: document.getElementById('profPhone').value.trim(),
                birthday: document.getElementById('profBirthday').value
            };

            try {
                const response = await fetch('./profile_api.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updatedProfile)
                });
                const result = await response.json();

                if (result.status === 'success') {
                    document.getElementById('userGreeting').innerText = `👋 會員 ${updatedProfile.name}`;
                    alert(`🎉 資料庫儲存成功！(您的會員識別 ID 為: ${result.db_id})`);
                    loadUserProfilePage();
                } else {
                    alert("❌ 儲存失敗：" + result.message);
                }
            } catch (error) {
                console.error("連線資料庫發生錯誤:", error);
                alert("資料庫連線失敗！");
            }
        }

        // --- 渲染歷史訂購紀錄清單 ---
        function renderHistoryOrdersList() {
            const user = localStorage.getItem('user');
            const container = document.getElementById('historyOrdersList');
            if (!container) return;

            const userOrders = JSON.parse(localStorage.getItem('orders_' + user)) || [];

            if (userOrders.length === 0) {
                container.innerHTML = `<div class="text-center py-5 text-muted"><p class="mb-0">您目前還沒有任何訂購紀錄 📜</p></div>`;
                return;
            }

            container.innerHTML = userOrders.map(order => `
                <div class="card mb-3 shadow-sm border-start border-3 border-primary">
                    <div class="card-body p-3">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <div>
                                <span class="fw-bold text-dark">訂單 #${order.order_id}</span>
                                <small class="text-muted ms-2">${order.date}</small>
                            </div>
                            <span class="badge bg-success text-white">已建立 (${order.status})</span>
                        </div>
                        <div class="small text-muted bg-light p-2 rounded mb-2">
                            <strong>收件資訊：</strong>已送往指定地址
                        </div>
                        <div class="text-end small">
                            共 ${order.items.reduce((a,b) => a+b.qty, 0)} 件商品，實付總額：<strong class="text-danger">$${order.total}</strong>
                        </div>
                    </div>
                </div>`).join('');
        }

        // --- 模擬登入與註冊狀態控制功能 ---
        function checkUserStatus() {
            const user = localStorage.getItem('user');
            const authButtons = document.getElementById('authButtons');
            const userInfo = document.getElementById('userInfo');
            
            if (user) {
                authButtons.classList.add('hidden');
                userInfo.classList.remove('hidden');
                const savedName = localStorage.getItem('regName_' + user) || user.split('@')[0];
                document.getElementById('userGreeting').innerText = `👋 會員 ${savedName}`;
            } else {
                authButtons.classList.remove('hidden');
                userInfo.classList.add('hidden');
            }
        }

        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginUser').value.trim();
            localStorage.setItem('user', email);
            
            // 登入後關閉 Modal
            const modalEl = document.getElementById('loginModal');
            const modal = bootstrap.Modal.getInstance(modalEl);
            if (modal) modal.hide();
            
            checkUserStatus();
            loadUserCart();
            updateCartUI();
            showSection('home');
            alert("🎉 登入成功！歡迎回來。");
        }

        function handleRegister(e) {
            e.preventDefault();
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regUser').value.trim();
            const pw = document.getElementById('regPw').value;
            const pwConfirm = document.getElementById('regPwConfirm').value;

            if (pw !== pwConfirm) {
                alert("❌ 兩次密碼輸入不一致！");
                return;
            }

            localStorage.setItem('regName_' + email, name);
            localStorage.setItem('user', email);

            const modalEl = document.getElementById('registerModal');
            const modal = bootstrap.Modal.getInstance(modalEl);
            if (modal) modal.hide();

            checkUserStatus();
            loadUserCart();
            updateCartUI();
            showSection('home');
            alert("✨ 註冊成功！已自動為您登入。");
        }

        function logout() {
            localStorage.removeItem('user');
            checkUserStatus();
            cart = [];
            updateCartUI();
            showSection('home');
            alert("👋 您已成功登出。");
        }
    </script>
</body>
</html>
